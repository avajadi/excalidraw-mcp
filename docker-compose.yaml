# The relay + web companion app as one service. The MCP server is NOT a service
# here: Claude spawns it on the host over stdio and points it at this relay via
# EXCALIDRAW_RELAY_URL=http://localhost:3030 (see README).
services:
  relay:
    build: .
    image: excalidraw-mcp-relay
    container_name: excalidraw-relay
    # Bind to localhost only — the scene API and WebSocket are unauthenticated.
    ports:
      - "127.0.0.1:3030:3030"
    environment:
      RELAY_PORT: "3030"
      EXCALIDRAW_OUTPUT_DIR: /data
    volumes:
      # Default: a Docker-managed named volume (declared under top-level `volumes:`).
      - excalidraw-scenes:/data
      # To keep scenes in a host directory instead, replace the line above with a
      # bind mount here (host:container) — do NOT put the host path under the
      # top-level `volumes:` block, that only takes a name + driver opts:
      #   - /home/you/excalidraw/scenes:/data
      # and add `user: "1000:1000"` (your uid:gid) so the files stay yours.
    networks:
      - excalidraw
    restart: unless-stopped

volumes:
  excalidraw-scenes:

# Named so the MCP container can join it and reach the relay as http://relay:3030:
#   docker run -i --rm --network excalidraw \
#     -e EXCALIDRAW_RELAY_URL=http://relay:3030 \
#     avajadi/excalidraw-mcp-relay mcp
networks:
  excalidraw:
    name: excalidraw